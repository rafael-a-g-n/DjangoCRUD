<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DjangoCRUD{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      html, body {
        height: 100%;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f8fafc;
      }
      .navbar {
        margin-bottom: 30px;
      }
      .container {
        margin-top: 40px;
        flex: 1 0 auto;
      }
      .footer {
        flex-shrink: 0;
      }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">DjangoCRUD</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/courses/">Courses</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/instructors/">Instructors</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/learners/">Learners</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
  <footer class="footer mt-auto py-3 bg-dark text-white-50">
    <div class="container text-center">
      <span>&copy; {{ year }} Rafael A. G. N. | Portfolio Project. All rights reserved.</span><br>
      <span>This project is for demonstration purposes only. <a href="https://github.com/rafael-a-g-n/DjangoCRUD" class="text-info" rel="noopener noreferrer" target="_blank">View on GitHub</a></span>
    </div>
  </footer>
