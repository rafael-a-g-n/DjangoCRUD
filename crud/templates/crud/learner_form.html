{% extends 'crud/base.html' %}
{% load form_tags %}
{% block content %}
<h2>{% if form.instance.pk %}Edit Learner{% else %}Add Learner{% endif %}</h2>
<form method="post" novalidate>
    {% csrf_token %}
    <table class="table">
        {{ form|render_form }}
    </table>
    <button type="submit" class="btn btn-sm btn-success">Save</button>
    <a href="{% url 'crud:learner_list' %}" class="btn btn-sm btn-secondary">Cancel</a>
</form>
{% endblock %}
