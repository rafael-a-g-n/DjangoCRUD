{% extends 'crud/base.html' %}
{% block content %}
<h2>Delete Learner</h2>
<p>Are you sure you want to delete learner <strong>{{ learner.first_name|escape }} {{ learner.last_name|escape }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-sm btn-danger">Confirm Delete</button>
    <a href="{% url 'crud:learner_list' %}" class="btn btn-sm btn-secondary">Cancel</a>
</form>
{% endblock %}
