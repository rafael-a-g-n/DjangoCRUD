{% extends 'crud/base.html' %}
{% load form_tags %}
{% block content %}
<h2>{% if form.instance.pk %}Edit Enrollment{% else %}Add Enrollment{% endif %}</h2>
<form method="post" novalidate>
    {% csrf_token %}
    <table class="table">
        {{ form|render_form }}
    </table>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
