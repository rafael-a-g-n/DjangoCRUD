{% extends 'crud/base.html' %}
{% block title %}Courses{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Courses</h2>
    <a href="{% url 'crud:course_create' %}" class="btn btn-primary">Add Course</a>
</div>
<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for course in courses %}
        <tr>
            <td>{{ course.name }}</td>
            <td>{{ course.description }}</td>
            <td>
                <a href="{% url 'crud:course_update' course.pk %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'crud:course_delete' course.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No courses found.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
